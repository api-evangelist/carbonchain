aid: carbonchain
name: CarbonChain
description: >-
  CarbonChain is a London- and New York-based carbon accounting platform
  founded in 2019 that is purpose-built for the highest-emitting, hardest-to-
  track commodity supply chains — metals and mining, energy, manufacturing,
  and agriculture. Its AI-assisted platform builds asset- and transaction-
  level emissions pictures using activity-based emission factors, and
  packages those calculations into modules for supply-chain emissions,
  corporate carbon footprints (Scope 1, 2, 3), product carbon footprints,
  scenario analysis, and regulatory compliance. The flagship CarbonChain
  Comply release ships a Carbon Reporting Hub aligned with EU CSRD, UK
  SECR, US SEC, and CDP, along with EU/UK CBAM declaration validation,
  automated CBAM XML generation, and a Supplier Engagement Module for
  collecting and validating supplier emissions data. CarbonChain Connect
  links producers and importers through shared installation-level CBAM
  infrastructure. The company is a CDP Accredited Provider (2024), is ISO
  27001 certified, and is backed by Y Combinator, Union Square Ventures,
  Voyager VC, and Aera VC, with $10M Series A funding (2023). CarbonChain
  serves manufacturers, commodity traders, banks, and procurement teams,
  and offers system-to-system API integration for delivering activity data
  in and pulling gold-standard emissions calculations out — but it does
  not publish a public developer portal, OpenAPI specification, SDK, or
  open-source client library. API access is offered as part of customer
  integration projects rather than as a self-serve developer surface.
